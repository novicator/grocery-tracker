<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Groceries" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Grocery Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Groceries</h1>
    <div class="summary">
      <span id="haveCount">0</span> have &middot;
      <span id="missCount">0</span> missing
    </div>
  </header>
  <main>
    <ul id="list"></ul>
  </main>
  <footer>
    <button id="resetBtn" type="button">Mark all missing</button>
  </footer>
  <script src="app.js"></script>
</body>
</html>
